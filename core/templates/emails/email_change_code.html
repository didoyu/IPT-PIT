<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #eee; border-radius: 10px; }
        .code { font-size: 32px; font-weight: bold; color: #4f46e5; letter-spacing: 5px; margin: 20px 0; }
        .footer { font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div className="container">
        <h2>Verify your new email address</h2>
        <p>Hi {{ username }},</p>
        <p>You requested to change your email address. Please use the following code to verify your new email:</p>
        <div className="code">{{ code }}</div>
        <p>If you did not request this change, please ignore this email.</p>
        <div className="footer">
            <p>EXAMSYS Examination Portal</p>
        </div>
    </div>
</body>
</html>
